<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Admin — Cronogramas Lei do Bem</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#185FA5;--blue-light:#E6F1FB;--blue-mid:#378ADD;
  --green:#3B6D11;--green-light:#EAF3DE;--green-mid:#639922;
  --amber:#BA7517;--amber-light:#FAEEDA;
  --red:#A32D2D;--red-light:#FCEBEB;--red-mid:#E24B4A;
  --gray:#5F5E5A;--gray-light:#F1EFE8;--gray-mid:#B4B2A9;
  --teal:#0F6E56;
  --text:#1a1a18;--text-sec:#6b6b67;--text-hint:#9e9e9a;
  --bg:#f7f6f2;--surface:#ffffff;--border:#e2e1db;
  --radius:10px;--radius-lg:14px;
  font-family:'DM Sans',sans-serif;
}
body{background:var(--bg);color:var(--text);min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:32px;height:32px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center}
.logo-mark svg{width:18px;height:18px}
.logo-name{font-size:14px;font-weight:600;color:var(--text);letter-spacing:-.3px}
.logo-sub{font-size:11px;color:var(--text-sec);font-family:'DM Mono',monospace;margin-top:1px}
.admin-badge{font-size:11px;font-weight:500;padding:3px 10px;border-radius:99px;background:var(--amber-light);color:var(--amber);border:1px solid #FAC775}
.page{max-width:860px;margin:0 auto;padding:2rem 1.5rem 4rem}
.client-selector{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem 1.5rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.client-selector label{font-size:13px;font-weight:500;color:var(--text-sec);white-space:nowrap}
.client-selector select{flex:1;min-width:200px;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;cursor:pointer}
.client-selector select:focus{outline:none;border-color:var(--blue-mid)}
.save-indicator{font-size:12px;color:var(--text-hint);font-family:'DM Mono',monospace;margin-left:auto}
.save-indicator.saving{color:var(--amber)}
.save-indicator.saved{color:var(--green)}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.metric-label{font-size:11px;color:var(--text-hint);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.metric-value{font-size:22px;font-weight:600;color:var(--text);letter-spacing:-.5px}
.metric-sub{font-size:12px;color:var(--text-sec);margin-top:2px}
.progress-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:1.5rem}
.progress-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.progress-head span{font-size:13px;font-weight:500;color:var(--text)}
.progress-pct{font-size:13px;font-weight:600;color:var(--blue);font-family:'DM Mono',monospace}
.track{height:8px;background:var(--gray-light);border-radius:99px;overflow:hidden}
.fill{height:100%;background:linear-gradient(90deg,var(--blue-mid),var(--teal));border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.stages{display:flex;flex-direction:column;gap:8px}
.stage-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.stage-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none}
.stage-num{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;font-family:'DM Mono',monospace}
.stage-info{flex:1;min-width:0}
.stage-name{font-size:14px;font-weight:500;color:var(--text)}
.stage-date{font-size:12px;color:var(--text-hint);margin-top:1px;font-family:'DM Mono',monospace}
.badge{font-size:11px;font-weight:500;padding:3px 10px;border-radius:99px;white-space:nowrap;flex-shrink:0}
.chev{font-size:11px;color:var(--text-hint);transition:transform .2s;flex-shrink:0;margin-left:4px}
.stage-body{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.4,0,.2,1)}
.stage-body.open{max-height:1200px}
.stage-inner{padding:0 16px 16px;border-top:1px solid var(--border)}
.section-label{font-size:11px;font-weight:500;color:var(--text-hint);text-transform:uppercase;letter-spacing:.6px;font-family:'DM Mono',monospace;margin:14px 0 8px}
.item-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--border);border-radius:8px;margin-bottom:5px;background:var(--bg)}
.item-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.item-name{flex:1;font-size:13px;color:var(--text)}
.status-select{font-size:12px;font-weight:500;padding:4px 8px;border-radius:6px;border:1px solid var(--border);font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s;min-width:130px}
.status-select:focus{outline:none}
.status-select.pending{background:var(--gray-light);color:var(--gray);border-color:var(--gray-mid)}
.status-select.in-progress{background:var(--blue-light);color:var(--blue);border-color:#B5D4F4}
.status-select.done{background:var(--green-light);color:var(--green);border-color:#C0DD97}
.status-select.delayed{background:var(--red-light);color:var(--red);border-color:#F09595}
.note-row{margin-top:10px}
.note-label{font-size:11px;font-weight:500;color:var(--text-hint);text-transform:uppercase;letter-spacing:.6px;font-family:'DM Mono',monospace;margin-bottom:6px}
.note-input{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;resize:vertical;min-height:60px}
.note-input:focus{outline:none;border-color:var(--blue-mid)}
.loading{text-align:center;padding:3rem;color:var(--text-hint);font-size:14px}
.loading-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--gray-mid);margin:0 2px;animation:pulse 1.2s ease-in-out infinite}
.loading-dot:nth-child(2){animation-delay:.2s}
.loading-dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,80%,100%{opacity:.3}40%{opacity:1}}
.error-box{background:#FCEBEB;border:1px solid #F09595;border-radius:var(--radius);padding:14px 16px;font-size:13px;color:#A32D2D;margin:2rem 0}
.empty{text-align:center;padding:3rem;color:var(--text-hint);font-size:14px}
@media(max-width:600px){
  .metrics{grid-template-columns:1fr 1fr}
  .topbar{padding:0 1rem}
  .page{padding:1.25rem 1rem 3rem}
  .client-selector{flex-direction:column;align-items:stretch}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 18 18" fill="none"><rect x="2" y="2" width="6" height="6" rx="1.5" fill="white" opacity=".9"/><rect x="10" y="2" width="6" height="6" rx="1.5" fill="white" opacity=".6"/><rect x="2" y="10" width="6" height="6" rx="1.5" fill="white" opacity=".6"/><rect x="10" y="10" width="6" height="6" rx="1.5" fill="white" opacity=".3"/></svg>
    </div>
    <div>
      <div class="logo-name">Painel Admin</div>
      <div class="logo-sub">Lei do Bem</div>
    </div>
  </div>
  <span class="admin-badge">Acesso restrito</span>
</div>

<div class="page">

  <div class="client-selector">
    <label>Cliente</label>
    <select id="client-select" onchange="loadClient()">
      <option value="">Selecione um cliente...</option>
    </select>
    <span class="save-indicator" id="save-indicator"></span>
  </div>

  <div id="dashboard" style="display:none">
    <div class="metrics">
      <div class="metric-card">
        <div class="metric-label">Progresso</div>
        <div class="metric-value" id="met-pct">—</div>
        <div class="metric-sub" id="met-tasks">carregando</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Etapas concluídas</div>
        <div class="metric-value" id="met-stages">—</div>
        <div class="metric-sub" id="met-stages-total">de — etapas</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Docs pendentes</div>
        <div class="metric-value" id="met-docs" style="color:var(--amber)">—</div>
        <div class="metric-sub">documentos aguardados</div>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-head">
        <span>Progresso geral</span>
        <span class="progress-pct" id="prog-pct">—</span>
      </div>
      <div class="track"><div class="fill" id="prog-fill" style="width:0%"></div></div>
    </div>

    <div class="stages" id="stages-list"></div>
  </div>

  <div id="main-loading" class="loading" style="display:none">
    <span class="loading-dot"></span>
    <span class="loading-dot"></span>
    <span class="loading-dot"></span>
  </div>

  <div id="empty-state" class="empty">Selecione um cliente para começar.</div>

</div>

<script>
// ============================================================
// CONFIGURAÇÃO — substitua pelos seus valores do Supabase
// ============================================================
const SUPABASE_URL = "https://ywckzclxdbhlbgqpmtvc.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3Y2t6Y2x4ZGJobGJncXBtdHZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NzgwNTksImV4cCI6MjA4OTI1NDA1OX0.Cfxbis5sgn2pT7mnULlEfqW1In1OmDBxUUTHsP3H3Og";
// ============================================================

let saveTimeout = null;

async function fetchJSON(path) {
  const res = await fetch(SUPABASE_URL + path, {
    headers: {"apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY}
  });
  if (!res.ok) throw new Error("Erro " + res.status);
  return res.json();
}

async function patchItem(id, fields) {
  const ind = document.getElementById("save-indicator");
  ind.textContent = "Salvando...";
  ind.className = "save-indicator saving";
  const res = await fetch(SUPABASE_URL + `/rest/v1/itens?id=eq.${id}`, {
    method: "PATCH",
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json",
      "Prefer": "return=minimal"
    },
    body: JSON.stringify(fields)
  });
  if (res.ok) {
    ind.textContent = "Salvo";
    ind.className = "save-indicator saved";
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(() => { ind.textContent = ""; ind.className = "save-indicator"; }, 2000);
  }
}

async function patchEtapa(id, fields) {
  const ind = document.getElementById("save-indicator");
  ind.textContent = "Salvando...";
  ind.className = "save-indicator saving";
  const res = await fetch(SUPABASE_URL + `/rest/v1/etapas?id=eq.${id}`, {
    method: "PATCH",
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json",
      "Prefer": "return=minimal"
    },
    body: JSON.stringify(fields)
  });
  if (res.ok) {
    ind.textContent = "Salvo";
    ind.className = "save-indicator saved";
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(() => { ind.textContent = ""; ind.className = "save-indicator"; }, 2000);
  }
}

function sc(s) {
  if (s === "done")        return {bg:"var(--green-light)", text:"var(--green)",  dot:"var(--green-mid)", label:"Concluído"};
  if (s === "in-progress") return {bg:"var(--blue-light)",  text:"var(--blue)",   dot:"var(--blue-mid)",  label:"Em andamento"};
  if (s === "delayed")     return {bg:"var(--red-light)",   text:"var(--red)",    dot:"var(--red-mid)",   label:"Em atraso"};
  return                          {bg:"var(--gray-light)",  text:"var(--gray)",   dot:"var(--gray-mid)",  label:"Pendente"};
}

function stageStatus(atividades) {
  if (!atividades.length) return "pending";
  if (atividades.some(t => t.status === "delayed")) return "delayed";
  const done = atividades.filter(t => t.status === "done").length;
  if (done === atividades.length) return "done";
  if (done > 0 || atividades.some(t => t.status === "in-progress")) return "in-progress";
  return "pending";
}

function updateMetrics(atividades, documentos, etapas) {
  const totalAtiv = atividades.length;
  const doneAtiv  = atividades.filter(a => a.status === "done").length;
  const pct       = totalAtiv ? Math.round(doneAtiv / totalAtiv * 100) : 0;
  const pendDocs  = documentos.filter(d => d.status === "pending").length;
  const doneStages = etapas.filter(e => {
    const ea = atividades.filter(a => a.etapa_id === e.id);
    return stageStatus(ea) === "done";
  }).length;
  document.getElementById("prog-pct").textContent         = pct + "%";
  document.getElementById("prog-fill").style.width        = pct + "%";
  document.getElementById("met-pct").textContent          = pct + "%";
  document.getElementById("met-tasks").textContent        = doneAtiv + " de " + totalAtiv + " atividades";
  document.getElementById("met-stages").textContent       = doneStages;
  document.getElementById("met-stages-total").textContent = "de " + etapas.length + " etapas";
  document.getElementById("met-docs").textContent         = pendDocs;
}

function toggleStage(si) {
  const b = document.getElementById("body-" + si);
  const c = document.getElementById("chv-" + si);
  b.classList.toggle("open");
  c.style.transform = b.classList.contains("open") ? "rotate(180deg)" : "rotate(0deg)";
}

function onStatusChange(sel, itemId, allItens, etapas) {
  const newStatus = sel.value;
  sel.className = "status-select " + newStatus;
  const item = allItens.find(i => i.id === itemId);
  if (item) item.status = newStatus;
  const atividades = allItens.filter(i => i.tipo === "atividade");
  const documentos  = allItens.filter(i => i.tipo === "documento");
  updateMetrics(atividades, documentos, etapas);
  etapas.forEach((etapa, si) => {
    const ea  = atividades.filter(a => a.etapa_id === etapa.id);
    const ss  = stageStatus(ea);
    const col = sc(ss);
    const num = document.getElementById("snum-" + si);
    const bdg = document.getElementById("sbdg-" + si);
    if (num) { num.style.background = col.bg; num.style.color = col.text; }
    if (bdg) { bdg.style.background = col.bg; bdg.style.color = col.text; bdg.textContent = col.label; }
  });
  patchItem(itemId, {status: newStatus});
}

function onNoteChange(textarea, etapaId) {
  clearTimeout(textarea._t);
  textarea._t = setTimeout(() => {
    patchEtapa(etapaId, {observacao: textarea.value});
  }, 800);
}

async function loadClient() {
  const slug = document.getElementById("client-select").value;
  document.getElementById("dashboard").style.display    = "none";
  document.getElementById("empty-state").style.display  = "none";
  document.getElementById("main-loading").style.display = "none";
  document.getElementById("stages-list").innerHTML = "";
  if (!slug) { document.getElementById("empty-state").style.display = "block"; return; }

  document.getElementById("main-loading").style.display = "block";
  try {
    const [etapas, itens] = await Promise.all([
      fetchJSON(`/rest/v1/etapas?cliente_slug=eq.${slug}&order=ordem.asc&select=*`),
      fetchJSON(`/rest/v1/itens?cliente_slug=eq.${slug}&order=ordem.asc&select=*`)
    ]);

    const atividades = itens.filter(i => i.tipo === "atividade");
    const documentos  = itens.filter(i => i.tipo === "documento");

    document.getElementById("main-loading").style.display = "none";
    document.getElementById("dashboard").style.display    = "block";
    updateMetrics(atividades, documentos, etapas);

    const list = document.getElementById("stages-list");
    list.innerHTML = "";

    etapas.forEach((etapa, si) => {
      const ea = atividades.filter(a => a.etapa_id === etapa.id);
      const ed = documentos.filter(d => d.etapa_id === etapa.id);
      const ss  = stageStatus(ea);
      const col = sc(ss);
      const autoOpen = ss === "in-progress" || ss === "delayed";

      const card = document.createElement("div");
      card.className = "stage-card";

      const ativHtml = ea.map(t => {
        const tc = sc(t.status);
        return `<div class="item-row">
          <div class="item-dot" style="background:${tc.dot}"></div>
          <span class="item-name">${t.nome}</span>
          <select class="status-select ${t.status}" onchange="onStatusChange(this,${t.id},allItens,etapas)">
            <option value="pending"     ${t.status==="pending"     ?"selected":""}>Pendente</option>
            <option value="in-progress" ${t.status==="in-progress" ?"selected":""}>Em andamento</option>
            <option value="done"        ${t.status==="done"        ?"selected":""}>Concluído</option>
            <option value="delayed"     ${t.status==="delayed"     ?"selected":""}>Em atraso</option>
          </select>
        </div>`;
      }).join("");

      const docsHtml = ed.length > 0 ? `
        <div class="section-label">Documentos</div>
        ${ed.map(d => {
          const dc = sc(d.status);
          return `<div class="item-row">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="flex-shrink:0;color:var(--text-hint)"><rect x="2" y="1" width="9" height="11" rx="1.5" stroke="currentColor" stroke-width="1"/><path d="M4 4.5h5M4 6.5h5M4 8.5h3" stroke="currentColor" stroke-width=".9"/></svg>
            <span class="item-name">${d.nome}</span>
            <select class="status-select ${d.status}" onchange="onStatusChange(this,${d.id},allItens,etapas)">
              <option value="pending"  ${d.status==="pending" ?"selected":""}>Pendente</option>
              <option value="done"     ${d.status==="done"    ?"selected":""}>Recebido</option>
              <option value="delayed"  ${d.status==="delayed" ?"selected":""}>Em atraso</option>
            </select>
          </div>`;
        }).join("")}` : "";

      card.innerHTML = `
        <div class="stage-header" onclick="toggleStage(${si})">
          <div class="stage-num" id="snum-${si}" style="background:${col.bg};color:${col.text}">${String(si+1).padStart(2,"0")}</div>
          <div class="stage-info">
            <div class="stage-name">${etapa.nome}</div>
            <div class="stage-date">${etapa.periodo}</div>
          </div>
          <span class="badge" id="sbdg-${si}" style="background:${col.bg};color:${col.text}">${col.label}</span>
          <span class="chev" id="chv-${si}">▼</span>
        </div>
        <div class="stage-body${autoOpen?" open":""}" id="body-${si}">
          <div class="stage-inner">
            <div class="section-label">Atividades</div>
            ${ativHtml}
            ${docsHtml}
            <div class="note-row">
              <div class="note-label">Observação</div>
              <textarea class="note-input" placeholder="Adicione uma observação para esta etapa..." oninput="onNoteChange(this,${etapa.id})">${etapa.observacao||""}</textarea>
            </div>
          </div>
        </div>
      `;
      list.appendChild(card);
      if (autoOpen) document.getElementById("chv-" + si).style.transform = "rotate(180deg)";
    });

    window.allItens = itens;
    window.etapas   = etapas;

  } catch(err) {
    document.getElementById("main-loading").style.display = "none";
    document.getElementById("stages-list").innerHTML = `<div class="error-box">Erro ao carregar: ${err.message}</div>`;
    document.getElementById("dashboard").style.display = "block";
  }
}

async function init() {
  try {
    const clientes = await fetchJSON(`/rest/v1/clientes?select=nome,slug&order=nome.asc`);
    const sel = document.getElementById("client-select");
    clientes.forEach(c => {
      const opt = document.createElement("option");
      opt.value = c.slug;
      opt.textContent = c.nome;
      sel.appendChild(opt);
    });
  } catch(err) {
    document.getElementById("empty-state").textContent = "Erro ao conectar com o Supabase. Verifique as credenciais.";
  }
}

init();
</script>
</body>
</html>
